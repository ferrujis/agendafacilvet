<script>
  const DB_URL = "https://easy-f9cc4-default-rtdb.firebaseio.com";

  async function rtdbGet(path) {
    const res = await fetch(`${DB_URL}/${path}.json`);
    if (!res.ok) throw new Error(`Erro ${res.status} ao ler ${path}`);
    return res.json();
  }
  async function rtdbPut(path, value) {
    const res = await fetch(`${DB_URL}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(value)
    });
    if (!res.ok) throw new Error(`Erro ${res.status} ao salvar ${path}`);
    return res.json();
  }
  async function rtdbPost(path, value) {
    const res = await fetch(`${DB_URL}/${path}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(value)
    });
    if (!res.ok) throw new Error(`Erro ${res.status} ao criar em ${path}`);
    return res.json();
  }
  async function rtdbDelete(path) {
    const res = await fetch(`${DB_URL}/${path}.json`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`Erro ${res.status} ao remover ${path}`);
  }

  function slotsObjToArray(obj) {
    if (!obj) return [];
    return Object.keys(obj).map(id => ({ id, ...obj[id] }));
  }

  let pollHandle = null;

  function getDeviceId() {
    let id = localStorage.getItem('agenda_device_id');
    if (!id) {
      id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));
      localStorage.setItem('agenda_device_id', id);
    }
    return id;
  }

  window.firebaseApi = {
    getDeviceId,
    listen(callback) {
      let stopped = false;
      async function tick() {
        if (stopped) return;
        try {
          const obj = await rtdbGet('slots');
          callback(slotsObjToArray(obj));
          window.dispatchEvent(new CustomEvent('firebase-config-ok'));
        } catch (e) {
          console.error("Realtime Database error:", e);
          window.dispatchEvent(new CustomEvent('firebase-config-error', { detail: e.message }));
        }
      }
      tick();
      pollHandle = setInterval(tick, 3000);
      return () => { stopped = true; clearInterval(pollHandle); };
    },
    async addSlot(date, time) {
      await rtdbPost('slots', { date, time, status: 'available' });
    },
    async removeSlot(id) {
      await rtdbDelete(`slots/${id}`);
    },
    async releaseSlot(id) {
      const current = await rtdbGet(`slots/${id}`);
      if (!current) return;
      await rtdbPut(`slots/${id}`, { date: current.date, time: current.time, status: 'available' });
    },
    async bookSlot(id, clientName, animalName) {
      const deviceId = getDeviceId();
      const current = await rtdbGet(`slots/${id}`);
      if (!current || current.status === 'booked') {
        throw new Error("already-booked");
      }
      const allSlots = slotsObjToArray(await rtdbGet('slots'));
      const alreadyBookedToday = allSlots.some(s => s.date === current.date && s.status === 'booked' && s.deviceId === deviceId);
      if (alreadyBookedToday) {
        throw new Error("one-per-day");
      }
      await rtdbPut(`slots/${id}`, { ...current, status: 'booked', clientName, animalName, deviceId });
      return true;
    },
    async addSlots(date, times) {
      const obj = {};
      times.forEach(t => {
        const key = `${date}_${t}`.replace(/[^a-zA-Z0-9_]/g, '');
        obj[key] = { date, time: t, status: 'available' };
      });
      const res = await fetch(`${DB_URL}/slots.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(obj)
      });
      if (!res.ok) throw new Error(`Erro ${res.status} ao adicionar horários`);
    },

    // ───────────── Admin / usuários ─────────────
    async sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    },
    _userKey(username) {
      return String(username).trim().toLowerCase().replace(/[^a-z0-9_]/g, '_');
    },
    async listAdmins() {
      const obj = await rtdbGet('admins');
      if (!obj) return [];
      return Object.keys(obj).map(k => ({ key: k, username: obj[k].username || k, createdAt: obj[k].createdAt || null }));
    },
    async ensureSeedAdmin() {
      // Cria um admin inicial apenas se não existir nenhum (migração da senha antiga).
      const obj = await rtdbGet('admins');
      if (obj && Object.keys(obj).length > 0) return false;
      const key = this._userKey('admin');
      const hash = await this.sha256('admin123');
      await rtdbPut(`admins/${key}`, { username: 'admin', hash, createdAt: Date.now() });
      return true;
    },
    async verifyAdmin(username, password) {
      const key = this._userKey(username);
      const rec = await rtdbGet(`admins/${key}`);
      if (!rec) return false;
      const hash = await this.sha256(password);
      return rec.hash === hash;
    },
    async createAdmin(username, password) {
      const key = this._userKey(username);
      if (!key) throw new Error('Usuário inválido.');
      const existing = await rtdbGet(`admins/${key}`);
      if (existing) throw new Error('Esse usuário já existe.');
      const hash = await this.sha256(password);
      await rtdbPut(`admins/${key}`, { username: String(username).trim(), hash, createdAt: Date.now() });
    },
    async changePassword(username, newPassword) {
      const key = this._userKey(username);
      const rec = await rtdbGet(`admins/${key}`);
      if (!rec) throw new Error('Usuário não encontrado.');
      const hash = await this.sha256(newPassword);
      await rtdbPut(`admins/${key}`, { ...rec, hash });
    },
    async deleteAdmin(username) {
      const key = this._userKey(username);
      await rtdbDelete(`admins/${key}`);
    },

    // ───────────── Logs ─────────────
    async addLog(actor, action) {
      await rtdbPost('logs', { actor, action, at: Date.now() });
    },
    async listLogs(limit = 200) {
      const obj = await rtdbGet('logs');
      if (!obj) return [];
      return Object.keys(obj)
        .map(id => ({ id, ...obj[id] }))
        .sort((a, b) => (b.at || 0) - (a.at || 0))
        .slice(0, limit);
    }
  };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const txt = d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
  return txt.charAt(0).toUpperCase() + txt.slice(1);
}

function formatTimestamp(ms) {
  if (!ms) return '';
  return new Date(ms).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function App() {
  const [tab, setTab] = useState('cliente');
  const [slots, setSlots] = useState([]);
  const [ready, setReady] = useState(false);
  const [configError, setConfigError] = useState(null);

  useEffect(() => {
    let unsubscribe = null;
    function onReady() {
      setReady(true);
      unsubscribe = window.firebaseApi.listen((s) => {
        s.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
        setSlots(s);
      });
    }
    function onError(e) { setConfigError(e.detail); }
    function onOk() { setConfigError(null); }
    if (window.firebaseApi) onReady();
    else window.addEventListener('firebase-ready', onReady, { once: true });
    window.addEventListener('firebase-config-error', onError);
    window.addEventListener('firebase-config-ok', onOk);
    return () => {
      window.removeEventListener('firebase-config-error', onError);
      window.removeEventListener('firebase-config-ok', onOk);
      if (unsubscribe) unsubscribe();
    };
  }, []);

  return (
    <div>
      <div className="topbar">
        <div className="topbar-left">
          <div className="brand-icon">
            <svg viewBox="0 0 24 24" fill="#fff" stroke="none">

              <path d="M12 11.2c-2.4 0-4.6 1.8-5.2 4.1-.4 1.6.9 3 2.6 3 .9 0 1.7-.3 2.6-.3s1.7.3 2.6.3c1.7 0 3-1.4 2.6-3-.6-2.3-2.8-4.1-5.2-4.1Z"/>
            </svg>
          </div>
          <h1>Agendamento de visitas</h1>
          <p className="sub">Escolha um horário disponível para o seu pet.</p>
        </div>
        <div className="admin-btn" title={tab === 'admin' ? 'Fechar painel' : 'Administração'} onClick={() => setTab(tab === 'admin' ? 'cliente' : 'admin')}>
          {tab === 'admin' ? (
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          ) : (
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          )}
        </div>
      </div>

      <div className="content-wrap">
        {configError && (
          <div className="error-banner">
            Não foi possível conectar ao Realtime Database ({configError}). Confira se a DB_URL está correta e se as regras permitem leitura/escrita.
          </div>
        )}
        {!ready ? <div className="empty">Conectando…</div> : (
          tab === 'cliente'
            ? <ClienteView slots={slots} />
            : <AdminView slots={slots} onBack={() => setTab('cliente')} />
        )}
      </div>
    </div>
  );
}

function ClienteView({ slots }) {
  const [chosenDate, setChosenDate] = useState('');
  const [selected, setSelected] = useState(null);
  const [name, setName] = useState('');
  const [animal, setAnimal] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [confirmed, setConfirmed] = useState(null);

  const byDate = {};
  slots.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });
  const dates = Object.keys(byDate).sort();

  async function handleBook() {
    if (!selected || !name.trim() || !animal.trim()) return;
    setSubmitting(true);
    setError('');
    try {
      await window.firebaseApi.bookSlot(selected.id, name.trim(), animal.trim());
      setConfirmed({ ...selected, clientName: name.trim(), animalName: animal.trim() });
    } catch (e) {
      if (e.message === 'one-per-day') {
        setError('Você já tem uma visita agendada para esse dia. Só é permitido um agendamento por dia.');
      } else {
        setError('Esse horário acabou de ser reservado por outra pessoa. Escolha outro, por favor.');
      }
      setSelected(null);
    }
    setSubmitting(false);
  }

  if (confirmed) {
    return (
      <div className="card">
        <div className="confirm-banner">Visita confirmada! ✓</div>
        <p style={{margin: '0 0 4px'}}><strong>{formatDateLabel(confirmed.date)}</strong> às <strong>{confirmed.time}</strong></p>
        <p className="meta">Tutor: {confirmed.clientName} · Animal: {confirmed.animalName}</p>
        <button className="btn btn-ghost on-card" style={{marginTop: 16}} onClick={() => { setConfirmed(null); setSelected(null); setName(''); setAnimal(''); }}>Agendar outro horário</button>
      </div>
    );
  }

  if (dates.length === 0) {
    return <div className="card"><div className="empty">Nenhum horário disponível no momento. Volte em breve.</div></div>;
  }

  return (
    <div>
      <div className="card">
        <label>Escolha a data da visita</label>
        <input
          type="date"
          className="day-select"
          value={chosenDate}
          min={dates[0]}
          max={dates[dates.length - 1]}
          onChange={e => { setChosenDate(e.target.value); setSelected(null); setError(''); }}
        />
        {chosenDate && !byDate[chosenDate] && (
          <p className="meta" style={{marginTop: 8}}>Não há horários disponíveis nessa data. Datas com horários: {dates.map(d => formatDateLabel(d).split(',')[1]?.trim() || d).slice(0, 6).join(', ')}{dates.length > 6 ? '…' : ''}.</p>
        )}
      </div>

      {chosenDate && byDate[chosenDate] && (
        <div className="card" style={{marginTop: 14}}>
          <p style={{margin: '0 0 10px', fontWeight: 700}}>Horários disponíveis</p>
          <div className="slot-grid">
            {byDate[chosenDate].map(s => (
              <button
                key={s.id}
                className={"slot-btn" + (s.status === 'booked' ? ' booked' : '') + (selected && selected.id === s.id ? ' selected' : '')}
                disabled={s.status === 'booked'}
                onClick={() => setSelected(s)}
              >
                {s.time}
              </button>
            ))}
          </div>
          {byDate[chosenDate].every(s => s.status === 'booked') && (
            <div className="empty" style={{marginTop: 6}}>Todos os horários desse dia já foram reservados.</div>
          )}
        </div>
      )}

      {selected && (
        <div className="card" style={{marginTop: 14}}>
          <p style={{margin: '0 0 4px', fontWeight: 700}}>Confirmar visita: {formatDateLabel(selected.date)} às {selected.time}</p>
          <label>Seu nome</label>
          <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Nome completo" />
          <label>Nome do animal</label>
          <input type="text" value={animal} onChange={e => setAnimal(e.target.value)} placeholder="Ex: Bolinha" />
          {error && <p style={{color: '#B5562D', fontSize: 13, marginTop: 10}}>{error}</p>}
          <button
            className="btn btn-primary"
            style={{marginTop: 16}}
            disabled={submitting || !name.trim() || !animal.trim()}
            onClick={handleBook}
          >
            {submitting ? 'Confirmando…' : 'Confirmar agendamento'}
          </button>
        </div>
      )}
    </div>
  );
}

function AdminView({ slots, onBack }) {
  const [unlocked, setUnlocked] = useState(false);
  const [currentUser, setCurrentUser] = useState('');
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [passError, setPassError] = useState('');
  const [checking, setChecking] = useState(false);
  const [date, setDate] = useState('');
  const [time, setTime] = useState('');
  const [pendingTimes, setPendingTimes] = useState([]);
  const [busy, setBusy] = useState(false);
  const [view, setView] = useState('agenda');
  const [dateMode, setDateMode] = useState('single'); // 'single' | 'range'
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState('');
  const [weekdays, setWeekdays] = useState([1, 2, 3, 4, 5]); // seg–sex por padrão
  const [rangeMsg, setRangeMsg] = useState('');
  const [selectMode, setSelectMode] = useState(false);
  const [selectedSlots, setSelectedSlots] = useState([]);

  async function log(action) {
    try { await window.firebaseApi.addLog(currentUser || user || 'desconhecido', action); } catch (e) {}
  }

  async function tryUnlock() {
    setChecking(true);
    setPassError('');
    try {
      await window.firebaseApi.ensureSeedAdmin();
      const ok = await window.firebaseApi.verifyAdmin(user, pass);
      if (ok) {
        const uname = user.trim();
        setCurrentUser(uname);
        setUnlocked(true);
        await window.firebaseApi.addLog(uname, 'Acessou o painel administrativo');
      } else {
        setPassError('Usuário ou senha incorretos.');
      }
    } catch (e) {
      setPassError('Erro ao validar: ' + e.message);
    }
    setChecking(false);
  }

  function addTimeToList() {
    if (!time) return;
    if (!pendingTimes.includes(time)) {
      setPendingTimes([...pendingTimes, time].sort());
    }
    setTime('');
  }

  function removeTimeFromList(t) {
    setPendingTimes(pendingTimes.filter(x => x !== t));
  }

  async function saveAllTimes() {
    if (!date || pendingTimes.length === 0) return;
    setBusy(true);
    const existing = new Set(slots.filter(s => s.date === date).map(s => s.time));
    const toAdd = pendingTimes.filter(t => !existing.has(t));
    if (toAdd.length > 0) {
      await window.firebaseApi.addSlots(date, toAdd);
      await log(`Adicionou ${toAdd.length} horário(s) em ${date}: ${toAdd.join(', ')}`);
    }
    setPendingTimes([]);
    setBusy(false);
  }

  function toggleWeekday(d) {
    setWeekdays(weekdays.includes(d) ? weekdays.filter(x => x !== d) : [...weekdays, d].sort());
  }

  function datesInRange() {
    if (!startDate || !endDate) return [];
    const out = [];
    let cur = new Date(startDate + 'T00:00:00');
    const end = new Date(endDate + 'T00:00:00');
    while (cur <= end) {
      // getDay(): 0=domingo … 6=sábado
      if (weekdays.includes(cur.getDay())) {
        out.push(`${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, '0')}-${String(cur.getDate()).padStart(2, '0')}`);
      }
      cur.setDate(cur.getDate() + 1);
    }
    return out;
  }

  async function saveRange() {
    setRangeMsg('');
    const targetDates = datesInRange();
    if (targetDates.length === 0 || pendingTimes.length === 0) return;
    setBusy(true);
    let totalAdded = 0;
    for (const d of targetDates) {
      const existing = new Set(slots.filter(s => s.date === d).map(s => s.time));
      const toAdd = pendingTimes.filter(t => !existing.has(t));
      if (toAdd.length > 0) {
        await window.firebaseApi.addSlots(d, toAdd);
        totalAdded += toAdd.length;
      }
    }
    await log(`Adicionou ${totalAdded} horário(s) em ${targetDates.length} dia(s) (${targetDates[0]} a ${targetDates[targetDates.length - 1]}): ${pendingTimes.join(', ')}`);
    setRangeMsg(`${totalAdded} horário(s) criado(s) em ${targetDates.length} dia(s).`);
    setPendingTimes([]);
    setBusy(false);
  }

  async function removeSlot(s) {
    setBusy(true);
    if (s.status === 'booked') {
      await window.firebaseApi.releaseSlot(s.id);
      await log(`Liberou o horário ${s.date} ${s.time} (estava com ${s.clientName || 'tutor'})`);
    } else {
      await window.firebaseApi.removeSlot(s.id);
      await log(`Removeu o horário ${s.date} ${s.time}`);
    }
    setBusy(false);
  }

  function toggleSelectSlot(id) {
    setSelectedSlots(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  async function removeSelectedSlots(list) {
    const chosen = list.filter(s => selectedSlots.includes(s.id));
    if (chosen.length === 0) return;
    const okConfirm = window.confirm(`Remover/liberar ${chosen.length} horário(s) selecionado(s)?`);
    if (!okConfirm) return;
    setBusy(true);
    let removed = 0, released = 0;
    for (const s of chosen) {
      if (s.status === 'booked') {
        await window.firebaseApi.releaseSlot(s.id);
        released++;
      } else {
        await window.firebaseApi.removeSlot(s.id);
        removed++;
      }
    }
    await log(`Ação em lote: removeu ${removed} horário(s) livre(s) e liberou ${released} ocupado(s)`);
    setSelectedSlots([]);
    setSelectMode(false);
    setBusy(false);
  }

  if (!unlocked) {
    return (
      <div className="lock-screen">
        <div className="card">
          <label>Usuário</label>
          <input type="text" value={user} onChange={e => setUser(e.target.value)} onKeyDown={e => e.key === 'Enter' && tryUnlock()} placeholder="Digite o usuário" autoComplete="username" />
          <label style={{marginTop: 12}}>Senha de administração</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && tryUnlock()} placeholder="Digite a senha" autoComplete="current-password" />
          {passError && <p style={{color: '#B5562D', fontSize: 13, marginTop: 8}}>{passError}</p>}
          <button className="btn btn-primary" style={{marginTop: 14, width: '100%'}} disabled={checking} onClick={tryUnlock}>{checking ? 'Verificando…' : 'Entrar'}</button>
        </div>
      </div>
    );
  }

  const sorted = [...slots].sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  return (
    <div>
      <div style={{display: 'flex', justifyContent: 'flex-end', marginBottom: 14}}>
        <button className="btn btn-ghost on-card" onClick={() => { setUnlocked(false); setPass(''); setUser(''); setCurrentUser(''); setView('agenda'); }}>Sair</button>
      </div>

      <div className="subtabs">
        <div className={"subtab" + (view === 'agenda' ? ' active' : '')} onClick={() => setView('agenda')}>Agenda</div>
        <div className={"subtab" + (view === 'gerenciar' ? ' active' : '')} onClick={() => setView('gerenciar')}>Gerenciar horários</div>
        <div className={"subtab" + (view === 'usuarios' ? ' active' : '')} onClick={() => setView('usuarios')}>Usuários</div>
        <div className={"subtab" + (view === 'minhasenha' ? ' active' : '')} onClick={() => setView('minhasenha')}>Minha senha</div>
        <div className={"subtab" + (view === 'logs' ? ' active' : '')} onClick={() => setView('logs')}>Logs</div>
      </div>

      {view === 'agenda' && <AgendaView slots={sorted} />}

      {view === 'usuarios' && <UsersView currentUser={currentUser} onLog={log} />}

      {view === 'minhasenha' && <MyPasswordView currentUser={currentUser} onLog={log} />}

      {view === 'logs' && <LogsView />}

      {view === 'gerenciar' && (
        <div>
          <div className="card">
            <p style={{margin: '0 0 4px', fontWeight: 700}}>Liberar horários</p>
            <p className="meta" style={{marginBottom: 12}}>Adicione horários para um único dia ou para vários dias de uma vez (ex.: segunda a sexta).</p>

            <div className="subtabs on-card" style={{marginBottom: 14}}>
              <div className={"subtab" + (dateMode === 'single' ? ' active' : '')} onClick={() => { setDateMode('single'); setRangeMsg(''); }}>Um dia</div>
              <div className={"subtab" + (dateMode === 'range' ? ' active' : '')} onClick={() => { setDateMode('range'); setRangeMsg(''); }}>Vários dias</div>
            </div>

            {dateMode === 'single' ? (
              <div>
                <label>Data</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} />
              </div>
            ) : (
              <div>
                <div className="row">
                  <div style={{flex: 1}}>
                    <label>De</label>
                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
                  </div>
                  <div style={{flex: 1}}>
                    <label>Até</label>
                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
                  </div>
                </div>
                <label>Dias da semana</label>
                <div className="weekday-row">
                  {[['Dom',0],['Seg',1],['Ter',2],['Qua',3],['Qui',4],['Sex',5],['Sáb',6]].map(([lbl, d]) => (
                    <span
                      key={d}
                      className={"weekday-chip" + (weekdays.includes(d) ? ' active' : '')}
                      onClick={() => toggleWeekday(d)}
                    >{lbl}</span>
                  ))}
                </div>
                {startDate && endDate && (
                  <p className="meta" style={{marginTop: 8}}>{datesInRange().length} dia(s) selecionado(s) no período.</p>
                )}
              </div>
            )}

            <label style={{marginTop: 12}}>Horário</label>
            <div className="row">
              <input type="time" value={time} onChange={e => setTime(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTimeToList()} />
              <button className="btn btn-ghost on-card" style={{flex: '0 0 auto'}} disabled={!time} onClick={addTimeToList}>+ Adicionar à lista</button>
            </div>

            {pendingTimes.length > 0 && (
              <div className="chip-list">
                {pendingTimes.map(t => (
                  <span key={t} className="chip">{t} <span className="chip-x" onClick={() => removeTimeFromList(t)}>×</span></span>
                ))}
              </div>
            )}

            {dateMode === 'single' ? (
              <button
                className="btn btn-primary"
                style={{marginTop: 16}}
                disabled={busy || !date || pendingTimes.length === 0}
                onClick={saveAllTimes}
              >
                {busy ? 'Salvando…' : `Salvar ${pendingTimes.length || ''} horário${pendingTimes.length === 1 ? '' : 's'}`.trim()}
              </button>
            ) : (
              <button
                className="btn btn-primary"
                style={{marginTop: 16}}
                disabled={busy || !startDate || !endDate || weekdays.length === 0 || pendingTimes.length === 0 || datesInRange().length === 0}
                onClick={saveRange}
              >
                {busy ? 'Salvando…' : `Salvar em ${datesInRange().length} dia(s)`}
              </button>
            )}
            {rangeMsg && <p style={{color: '#047857', fontSize: 13, marginTop: 10}}>{rangeMsg}</p>}
          </div>

          <div className="card">
            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10, gap: 8, flexWrap: 'wrap'}}>
              <p style={{margin: 0, fontWeight: 700}}>Horários cadastrados ({sorted.length})</p>
              {sorted.length > 0 && (
                <button
                  className="btn btn-ghost on-card"
                  style={{flex: '0 0 auto'}}
                  onClick={() => { setSelectMode(!selectMode); setSelectedSlots([]); }}
                >
                  {selectMode ? 'Cancelar seleção' : 'Selecionar vários'}
                </button>
              )}
            </div>

            {selectMode && sorted.length > 0 && (
              <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, flexWrap: 'wrap', padding: '8px 0 12px', borderBottom: '1px solid #DCEDE8', marginBottom: 6}}>
                <label style={{display: 'flex', alignItems: 'center', gap: 8, margin: 0, fontWeight: 600, cursor: 'pointer'}}>
                  <input
                    type="checkbox"
                    checked={selectedSlots.length === sorted.length && sorted.length > 0}
                    onChange={e => setSelectedSlots(e.target.checked ? sorted.map(s => s.id) : [])}
                  />
                  Selecionar todos ({selectedSlots.length})
                </label>
                <button
                  className="btn btn-danger"
                  style={{flex: '0 0 auto'}}
                  disabled={busy || selectedSlots.length === 0}
                  onClick={() => removeSelectedSlots(sorted)}
                >
                  {busy ? 'Processando…' : `Remover ${selectedSlots.length || ''} selecionado${selectedSlots.length === 1 ? '' : 's'}`.trim()}
                </button>
              </div>
            )}

            {sorted.length === 0 && <div className="empty">Nenhum horário cadastrado ainda.</div>}
            {sorted.map(s => (
              <div key={s.id} className="admin-slot-row">
                <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                  {selectMode && (
                    <input
                      type="checkbox"
                      checked={selectedSlots.includes(s.id)}
                      onChange={() => toggleSelectSlot(s.id)}
                    />
                  )}
                  <div>
                    <div>{formatDateLabel(s.date)} · {s.time}</div>
                    {s.status === 'booked' && <div className="meta">Tutor: {s.clientName} · Animal: {s.animalName}</div>}
                  </div>
                </div>
                <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                  <span className={"tag " + (s.status === 'booked' ? 'tag-booked' : 'tag-free')}>{s.status === 'booked' ? 'Ocupado' : 'Livre'}</span>
                  {!selectMode && <button className="btn btn-danger" onClick={() => removeSlot(s)}>{s.status === 'booked' ? 'Liberar horário' : 'Remover'}</button>}
                </div>
              </div>
            ))}
          </div>
          <p className="small-note">Os dados ficam salvos no Realtime Database (Firebase) e são compartilhados entre todos que acessam este link.</p>
        </div>
      )}
    </div>
  );
}

function MyPasswordView({ currentUser, onLog }) {
  const [cur, setCur] = useState('');
  const [nw, setNw] = useState('');
  const [conf, setConf] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');

  async function submit() {
    setMsg(''); setErr('');
    if (!cur || !nw || !conf) { setErr('Preencha todos os campos.'); return; }
    if (nw !== conf) { setErr('A nova senha e a confirmação não coincidem.'); return; }
    if (nw.length < 4) { setErr('A nova senha deve ter ao menos 4 caracteres.'); return; }
    setBusy(true);
    try {
      const ok = await window.firebaseApi.verifyAdmin(currentUser, cur);
      if (!ok) { setErr('A senha atual está incorreta.'); setBusy(false); return; }
      await window.firebaseApi.changePassword(currentUser, nw);
      await onLog('Alterou a própria senha');
      setMsg('Senha alterada com sucesso.');
      setCur(''); setNw(''); setConf('');
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }

  return (
    <div className="card">
      <p style={{margin: '0 0 4px', fontWeight: 700}}>Alterar minha senha</p>
      <p className="meta" style={{marginBottom: 12}}>Conectado como <strong>{currentUser}</strong>.</p>
      <label>Senha atual</label>
      <input type="password" value={cur} onChange={e => setCur(e.target.value)} placeholder="Digite sua senha atual" autoComplete="current-password" />
      <label>Nova senha</label>
      <input type="password" value={nw} onChange={e => setNw(e.target.value)} placeholder="Nova senha" autoComplete="new-password" />
      <label>Confirmar nova senha</label>
      <input type="password" value={conf} onChange={e => setConf(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} placeholder="Repita a nova senha" autoComplete="new-password" />
      {err && <p style={{color: '#B5562D', fontSize: 13, marginTop: 10}}>{err}</p>}
      {msg && <p style={{color: '#047857', fontSize: 13, marginTop: 10}}>{msg}</p>}
      <button className="btn btn-primary" style={{marginTop: 16}} disabled={busy} onClick={submit}>{busy ? 'Salvando…' : 'Salvar nova senha'}</button>
    </div>
  );
}

function UsersView({ currentUser, onLog }) {
  const [admins, setAdmins] = useState(null);
  const [newUser, setNewUser] = useState('');
  const [newPass, setNewPass] = useState('');
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const [pwTarget, setPwTarget] = useState('');
  const [pwValue, setPwValue] = useState('');

  async function reload() {
    try { setAdmins(await window.firebaseApi.listAdmins()); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { reload(); }, []);

  async function create() {
    setErr(''); setMsg('');
    if (!newUser.trim() || !newPass) { setErr('Preencha usuário e senha.'); return; }
    setBusy(true);
    try {
      await window.firebaseApi.createAdmin(newUser, newPass);
      await onLog(`Criou o usuário "${newUser.trim()}"`);
      setMsg(`Usuário "${newUser.trim()}" criado.`);
      setNewUser(''); setNewPass('');
      await reload();
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }

  async function changePw(username) {
    setErr(''); setMsg('');
    if (!pwValue) { setErr('Digite a nova senha.'); return; }
    setBusy(true);
    try {
      await window.firebaseApi.changePassword(username, pwValue);
      await onLog(`Trocou a senha do usuário "${username}"`);
      setMsg(`Senha de "${username}" atualizada.`);
      setPwTarget(''); setPwValue('');
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }

  async function remove(username) {
    setErr(''); setMsg('');
    if (admins && admins.length <= 1) { setErr('Não é possível excluir o único usuário restante.'); return; }
    if (username.toLowerCase() === currentUser.toLowerCase()) { setErr('Você não pode excluir o usuário com que está logado.'); return; }
    setBusy(true);
    try {
      await window.firebaseApi.deleteAdmin(username);
      await onLog(`Excluiu o usuário "${username}"`);
      setMsg(`Usuário "${username}" excluído.`);
      await reload();
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }

  return (
    <div>
      <div className="card">
        <p style={{margin: '0 0 4px', fontWeight: 700}}>Novo usuário</p>
        <p className="meta" style={{marginBottom: 10}}>Crie um novo administrador. A senha é guardada com hash no banco, nunca em texto puro.</p>
        <label>Usuário</label>
        <input type="text" value={newUser} onChange={e => setNewUser(e.target.value)} placeholder="ex.: maria" />
        <label>Senha</label>
        <input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="Defina uma senha" />
        <button className="btn btn-primary" style={{marginTop: 14}} disabled={busy} onClick={create}>Criar usuário</button>
      </div>

      {(msg || err) && (
        <p style={{color: err ? '#B5562D' : '#047857', fontSize: 13, margin: '0 0 12px'}}>{err || msg}</p>
      )}

      <div className="card">
        <p style={{margin: '0 0 10px', fontWeight: 700}}>Administradores ({admins ? admins.length : '…'})</p>
        {!admins && <div className="empty">Carregando…</div>}
        {admins && admins.length === 0 && <div className="empty">Nenhum usuário cadastrado.</div>}
        {admins && admins.map(a => (
          <div key={a.key} className="admin-slot-row" style={{flexWrap: 'wrap'}}>
            <div>
              <div>{a.username} {a.username.toLowerCase() === currentUser.toLowerCase() && <span className="meta">(você)</span>}</div>
              {a.createdAt && <div className="meta">Criado em {formatTimestamp(a.createdAt)}</div>}
            </div>
            <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
              <button className="btn btn-ghost" style={{flex: '0 0 auto'}} onClick={() => { setPwTarget(pwTarget === a.username ? '' : a.username); setPwValue(''); }}>Trocar senha</button>
              <button className="btn btn-danger" onClick={() => remove(a.username)}>Excluir</button>
            </div>
            {pwTarget === a.username && (
              <div className="row" style={{width: '100%', marginTop: 8}}>
                <input type="password" value={pwValue} onChange={e => setPwValue(e.target.value)} placeholder={`Nova senha para ${a.username}`} onKeyDown={e => e.key === 'Enter' && changePw(a.username)} />
                <button className="btn btn-primary" style={{flex: '0 0 auto'}} disabled={busy} onClick={() => changePw(a.username)}>Salvar</button>
              </div>
            )}
          </div>
        ))}
      </div>
      <p className="small-note">Observação: este app acessa o banco direto do navegador, então a real proteção dos dados depende das Regras de Segurança do Firebase. O hash evita expor senhas, mas para segurança forte use Firebase Authentication.</p>
    </div>
  );
}

function LogsView() {
  const [logs, setLogs] = useState(null);
  const [err, setErr] = useState('');

  async function reload() {
    try { setLogs(await window.firebaseApi.listLogs(200)); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { reload(); }, []);

  return (
    <div className="card">
      <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10}}>
        <p style={{margin: 0, fontWeight: 700}}>Registro de atividades</p>
        <button className="btn btn-ghost" style={{flex: '0 0 auto'}} onClick={reload}>Atualizar</button>
      </div>
      {err && <p style={{color: '#B5562D', fontSize: 13}}>{err}</p>}
      {!logs && <div className="empty">Carregando…</div>}
      {logs && logs.length === 0 && <div className="empty">Nenhuma atividade registrada ainda.</div>}
      {logs && logs.map(l => (
        <div key={l.id} className="admin-slot-row">
          <div>
            <div>{l.action}</div>
            <div className="meta">por {l.actor} · {formatTimestamp(l.at)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function AgendaView({ slots }) {
  const [selected, setSelected] = useState(null);
  const allDates = [...new Set(slots.map(s => s.date))].sort();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  const [activeDate, setActiveDate] = useState(allDates.includes(todayStr) ? todayStr : (allDates[0] || ''));

  useEffect(() => {
    if (allDates.length > 0 && !allDates.includes(activeDate)) {
      setActiveDate(allDates.includes(todayStr) ? todayStr : allDates[0]);
    }
  }, [slots.length]);

  if (slots.length === 0) {
    return <div className="card"><div className="empty">Nenhum horário cadastrado ainda. Vá em "Gerenciar horários" para adicionar.</div></div>;
  }

  const dayDates = activeDate === 'todos' ? allDates : [activeDate];
  const dayTimes = [...new Set(slots.filter(s => dayDates.includes(s.date)).map(s => s.time))].sort();

  const byKey = {};
  slots.forEach(s => { byKey[`${s.date}|${s.time}`] = s; });

  const visibleSlots = slots.filter(s => dayDates.includes(s.date));
  const bookedCount = visibleSlots.filter(s => s.status === 'booked').length;

  return (
    <div>
      <div className="card" style={{marginBottom: 16}}>
        <label style={{marginTop: 0}}>Visualizando</label>
        <select className="day-select" value={activeDate} onChange={e => setActiveDate(e.target.value)}>
          {allDates.map(d => (
            <option key={d} value={d}>{formatDateLabel(d)}</option>
          ))}
          <option value="todos">Todos os dias</option>
        </select>
        <div className="agenda-summary" style={{marginTop: 12}}>
          <div><strong>{bookedCount}</strong> agendada{bookedCount !== 1 ? 's' : ''}</div>
          <div className="meta">de {visibleSlots.length} horário{visibleSlots.length !== 1 ? 's' : ''} {activeDate === 'todos' ? 'no total' : 'nesse dia'}</div>
        </div>
      </div>

      <div className="card agenda-card">
        <div className="agenda-grid" style={{ gridTemplateColumns: `72px repeat(${dayDates.length}, minmax(110px, 1fr))` }}>
          <div className="agenda-corner"></div>
          {dayDates.map(d => (
            <div key={d} className="agenda-day-head">
              {new Date(d + "T00:00:00").toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '')}
              <div className="agenda-day-num">{new Date(d + "T00:00:00").getDate().toString().padStart(2, '0')}/{(new Date(d + "T00:00:00").getMonth() + 1).toString().padStart(2, '0')}</div>
            </div>
          ))}

          {dayTimes.map(t => (
            <React.Fragment key={t}>
              <div className="agenda-time-label">{t}</div>
              {dayDates.map(d => {
                const s = byKey[`${d}|${t}`];
                if (!s) return <div key={d} className="agenda-cell agenda-cell-empty"></div>;
                return (
                  <div
                    key={d}
                    className={"agenda-cell " + (s.status === 'booked' ? 'agenda-cell-booked' : 'agenda-cell-free')}
                    onClick={() => s.status === 'booked' && setSelected(s)}
                  >
                    {s.status === 'booked' ? (s.animalName || s.clientName || 'Ocupado') : ''}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>

      {selected && (
        <div className="card" style={{marginTop: 16}}>
          <p style={{margin: '0 0 6px', fontWeight: 700}}>{formatDateLabel(selected.date)} às {selected.time}</p>
          <p className="meta">Tutor: {selected.clientName}</p>
          <p className="meta">Animal: {selected.animalName}</p>
          <div className="row" style={{marginTop: 12}}>
            <button className="btn btn-ghost on-card" onClick={() => setSelected(null)}>Fechar</button>
            <button className="btn btn-danger" onClick={async () => { await window.firebaseApi.releaseSlot(selected.id); setSelected(null); }}>Liberar horário</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
